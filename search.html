<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — MarketBee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="search">

  <header class="site-header">
    <div class="wrap">
      <a href="index.html" class="logo"><span>MB</span> MarketBee</a>
      <nav class="main-nav">
        <a href="index.html" class="nav-link" data-page="home">Home</a>
        <a href="search.html" class="nav-link" data-page="search">Search</a>
        <a href="wishlist.html" class="nav-link" data-page="wishlist">
          Wishlist <span class="badge" data-wish-badge style="display:none">0</span>
        </a>
      </nav>
    </div>
  </header>

  <section class="search-hero">
    <div class="wrap">
      <h1>Find something specific</h1>
      <form class="search-bar" id="search-form">
        <input type="text" id="search-input" placeholder="Try “headphones”, “home”, or “travel”…" aria-label="Search products" autocomplete="off">
        <button type="submit">Search</button>
      </form>
    </div>
  </section>

  <main class="wrap section" style="padding-top:0;">
    <div class="search-meta" id="search-meta">Loading catalog…</div>
    <div class="product-grid" id="results-grid" aria-live="polite"></div>
  </main>

  <footer class="site-footer">
    <div class="wrap">MarketBee is a demo storefront. All products and reviews are fictional.</div>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/product-card.js"></script>
  <script>
    initHeader('search');

    let allProducts = [];
    const input = document.getElementById('search-input');
    const grid = document.getElementById('results-grid');
    const meta = document.getElementById('search-meta');

    function matches(product, query){
      const q = query.toLowerCase();
      return (
        product.name.toLowerCase().includes(q) ||
        product.category.toLowerCase().includes(q) ||
        product.tags.some(t => t.toLowerCase().includes(q))
      );
    }

    function runSearch(query){
      grid.innerHTML = '';
      const q = query.trim();

      if(!q){
        meta.textContent = `Showing all ${allProducts.length} products — start typing to narrow it down.`;
        allProducts.forEach(p => grid.appendChild(renderProductCard(p)));
        return;
      }

      const results = allProducts.filter(p => matches(p, q));
      meta.textContent = `${results.length} result${results.length === 1 ? '' : 's'} for "${q}"`;

      if(results.length === 0){
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="glyph">🔍</div>
            <h3>No products match "${q}"</h3>
            <p>Try a broader term like a category name, e.g. "electronics" or "home".</p>
          </div>`;
        return;
      }

      results.forEach(p => grid.appendChild(renderProductCard(p)));
    }

    async function init(){
      try{
        allProducts = await fetchProducts();
        const params = new URLSearchParams(window.location.search);
        const initialQuery = params.get('q') || '';
        input.value = initialQuery;
        runSearch(initialQuery);
      }catch(err){
        meta.textContent = '';
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="glyph">⚠</div><h3>Couldn't load products</h3><p>${err.message}</p></div>`;
      }
    }
    init();

    // Live search as the user types
    input.addEventListener('input', (e) => runSearch(e.target.value));

    // Also support explicit submit (button click / Enter)
    document.getElementById('search-form').addEventListener('submit', (e) => {
      e.preventDefault();
      runSearch(input.value);
    });
  </script>
</body>
</html>
